name: استخراج افلام

on:
  schedule:
    # ⭐ التشغيل كل 15 دقيقة
    - cron: '*/15 * * * *'
    # ⭐ التوقيتات الثابتة: 07:00, 15:00, 19:00 UTC
    - cron: '0 7,15,19 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout with token
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    # تحسين تثبيت المكتبات لتشمل Puppeteer
    - name: Install dependencies
      run: |
        npm init -y
        npm install jsdom puppeteer
    
    # خطوة حاسمة: تثبيت المتصفح الذي يحتاجه Puppeteer للعمل
    - name: Install Puppeteer Browsers
      run: npx puppeteer browsers install chrome

    - name: Ensure movies directory exists
      run: mkdir -p movies
    
    - name: Synchronize with remote
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin
        git reset --hard origin/main
        git clean -fd
        
    - name: Run movie scraper
      run: |
        echo "🎬 بدء استخراج الأفلام مع Network Interception..."
        node fetch.js --daily-update
      continue-on-error: true
    
    - name: Check for changes
      id: changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "✅ هناك تغييرات جديدة"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "⏭️ لا توجد تغييرات"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Push changes (if any)
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git add -A
        COMMIT_MSG="🎬 تحديث الأفلام - $(date +'%Y-%m-%d %H:%M')"
        git commit -m "$COMMIT_MSG"
        
        ATTEMPT=1
        MAX_ATTEMPTS=3
        
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "🚀 محاولة Push #$ATTEMPT"
          
          if git pull --rebase origin main; then
            echo "✅ تم سحب التغييرات بنجاح"
            
            if git push origin main; then
              echo "🎉 تم رفع التغييرات بنجاح!"
              break
            else
              echo "❌ فشل Push #$ATTEMPT"
            fi
          else
            echo "❌ فشل pull في المحاولة #$ATTEMPT"
          fi
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "💥 فشلت جميع المحاولات"
            exit 1
          fi
          
          ATTEMPT=$((ATTEMPT + 1))
          echo "⏳ انتظار 10 ثواني قبل المحاولة التالية..."
          sleep 10
        done
