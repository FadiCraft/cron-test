name: استخراج مباريات

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  extract-football-matches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          # تثبيت المتصفح اللازم لـ Puppeteer
          npx puppeteer browsers install chrome

      - name: Run football.js
        run: |
          mkdir -p football
          node football.js

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add football/Hg.json
          
          # التحقق إذا كانت هناك تغييرات فعلاً قبل الـ commit
          if git diff --cached --quiet; then
            echo "لا توجد تغييرات جديدة"
          else
            git commit -m "⚽ تحديث المباريات التلقائي - $(date)"
            git push
          fi
